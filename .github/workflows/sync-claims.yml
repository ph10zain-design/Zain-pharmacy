name: 🔐 Sync Custom Claims

# 🔴 v7.5: مزامنة دور المستخدم من Firestore إلى Firebase Auth Custom Claims
# بدون هذا، rules لن تتعرّف على دور المستخدم
# يعمل كل 5 دقائق + يدوياً عند الحاجة

on:
  schedule:
    # كل 5 دقائق
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  sync-claims:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: scripts
        run: npm install --omit=dev

      - name: Run sync
        working-directory: scripts
        env:
          FIREBASE_SA: ${{ secrets.FIREBASE_SA }}
        run: node sync-claims.js
