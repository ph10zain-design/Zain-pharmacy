name: 🧹 Daily Cleanup (OTPs + old queue + old notifs)

on:
  schedule:
    # كل يوم 3 صباحاً بغداد (0 UTC)
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: scripts
        run: npm install --omit=dev

      - name: Run cleanup
        working-directory: scripts
        env:
          FIREBASE_SA: ${{ secrets.FIREBASE_SA }}
        run: node cleanup-otps.js
